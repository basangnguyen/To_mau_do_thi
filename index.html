<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMA - Graph Color Pro & Learning Hub</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root { --bg: #eceff1; --card: #ffffff; --text: #2c3e50; --primary: #0054a5; --accent: #e74c3c; --kma-red: #cc0000; --overlay: rgba(0,0,0,0.85); }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --primary: #3498db; --kma-red: #ff4d4d; --overlay: rgba(0,0,0,0.95); }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; padding-bottom: 80px; overflow: hidden; /* Khóa cuộn khi chưa login */ }

        /* AUTH BARRIER (Màn hình khóa) */
        #auth-barrier {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 100000; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(var(--primary) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .auth-card {
            background: var(--card); width: 400px; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center; animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .auth-logo { width: 100px; margin-bottom: 20px; }
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .auth-tab { flex: 1; padding: 12px; cursor: pointer; font-weight: bold; color: #888; transition: 0.3s; }
        .auth-tab.active { color: var(--kma-red); border-bottom: 3px solid var(--kma-red); margin-bottom: -2px; }

        /* Main UI Elements (Ẩn đi cho đến khi login) */
        #main-content { filter: blur(10px); pointer-events: none; transition: 0.5s; }
        body.logged-in { overflow: auto; }
        body.logged-in #main-content { filter: blur(0); pointer-events: auto; }
        body.logged-in #auth-barrier { display: none; }

        /* Styles chung cho form */
        header { background: #fff; padding: 15px 25px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.1); border-bottom: 4px solid var(--kma-red); }
        [data-theme="dark"] header { background: #1e1e1e; }
        .controls-top { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; background: var(--card); color: var(--text); box-sizing: border-box; }
        .main-btn { width: 100%; background: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .tab-container { max-width: 1200px; margin: 20px auto; display: flex; gap: 10px; padding: 0 20px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; background: #cfd8dc; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .content-section { display: none; max-width: 1200px; margin: auto; padding: 0 20px; grid-template-columns: 340px 1fr; gap: 25px; }
        .content-section.active { display: grid; }
        #mynetwork { height: 400px; background: #f8f9fa; border-radius: 8px; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<!-- MÀN HÌNH KHÓA (BẮT BUỘC ĐĂNG NHẬP) -->
<div id="auth-barrier">
    <div class="auth-card">
        <img src="https://gist.githubusercontent.com/vinhjaxt/fa4208fd6902dd8b2f4d944fa6e7f2af/raw/logo-hvktmm.png" class="auth-logo" alt="KMA Logo">
        <h2 style="margin-top: 0; color: var(--kma-red);">KMA LEARNING HUB</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Vui lòng đăng nhập để tiếp tục học tập</p>
        
        <div class="auth-tabs">
            <div id="tab-l" class="auth-tab active" onclick="switchForm('l')">Đăng nhập</div>
            <div id="tab-r" class="auth-tab" onclick="switchForm('r')">Tạo tài khoản</div>
        </div>

        <div id="form-l">
            <input type="text" id="user-l" placeholder="Mã sinh viên / Email">
            <input type="password" id="pass-l" placeholder="Mật khẩu">
            <button class="main-btn" onclick="login()">Đăng nhập ngay</button>
        </div>

        <div id="form-r" style="display: none;">
            <input type="text" placeholder="Họ và tên">
            <input type="text" placeholder="Mã sinh viên (Vd: AT18...)">
            <input type="password" placeholder="Mật khẩu">
            <button class="main-btn" style="background: var(--kma-red);" onclick="login()">Đăng ký tài khoản</button>
        </div>
    </div>
</div>

<!-- NỘI DUNG CHÍNH (SẼ HIỆN SAU KHI LOGIN) -->
<div id="main-content">
    <div class="controls-top">
        <button class="tab-btn" onclick="logout()" style="background: var(--kma-red); color: white;">Đăng xuất</button>
        <div class="theme-toggle" onclick="toggleTheme()" style="cursor:pointer; background:var(--card); padding:8px; border-radius:8px;">🌓</div>
    </div>

    <header>
        <div class="header-title">
            <h1>Học viện Kỹ thuật Mật mã</h1>
            <p>Hệ thống hỗ trợ học tập & Giải toán Đồ thị</p>
        </div>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="showTab('calc')">🚀 Công cụ tính toán</button>
        <button class="tab-btn" onclick="showTab('theory')">📖 Kho tài liệu</button>
    </div>

    <div id="calc" class="content-section active">
        <div class="panel">
            <h2>⚙️ Thông số đồ thị</h2>
            <label>Số đỉnh:</label>
            <input type="number" id="vertices" value="4">
            <label>Danh sách cạnh (u-v):</label>
            <textarea id="edges" style="width:100%; height:80px; border-radius:8px; padding:10px;">0-1&#10;1-2&#10;2-3&#10;3-0</textarea>
            <button class="main-btn" onclick="runGraph()">Phân tích đồ thị</button>
        </div>
        <div class="panel">
            <h2>🖼️ Trực quan hóa</h2>
            <div id="mynetwork"></div>
            <div id="result-text" style="margin-top:15px; font-weight:bold;"></div>
        </div>
    </div>

    <div id="theory" class="content-section" style="display:none; grid-template-columns: 1fr;">
        <div class="panel">
            <h2>📖 Tài liệu hướng dẫn</h2>
            <p>Chào mừng sinh viên KMA đến với kho tài liệu Toán rời rạc...</p>
        </div>
    </div>
</div>

<script>
    // --- Logic Bảo mật & Đăng nhập ---
    function checkAuth() {
        const isLogged = localStorage.getItem('kma_logged');
        if (isLogged === 'true') {
            document.body.classList.add('logged-in');
        }
    }

    function login() {
        // Trong thực tế, bạn sẽ gọi API ở đây
        localStorage.setItem('kma_logged', 'true');
        document.body.classList.add('logged-in');
        alert("Đăng nhập thành công! Chào mừng bạn.");
    }

    function logout() {
        localStorage.removeItem('kma_logged');
        document.body.classList.remove('logged-in');
        location.reload();
    }

    function switchForm(mode) {
        document.getElementById('form-l').style.display = mode === 'l' ? 'block' : 'none';
        document.getElementById('form-r').style.display = mode === 'r' ? 'block' : 'none';
        document.getElementById('tab-l').classList.toggle('active', mode === 'l');
        document.getElementById('tab-r').classList.toggle('active', mode === 'r');
    }

    // --- Logic Giao diện ---
    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
        document.getElementById(tabId).style.display = (tabId === 'calc' ? 'grid' : 'block');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // --- Logic Đồ thị (Rút gọn) ---
    function runGraph() {
        const v = parseInt(document.getElementById('vertices').value);
        const edgesStr = document.getElementById('edges').value.trim();
        let nodes = [], es = [];
        for(let i=0; i<v; i++) nodes.push({id:i, label: i.toString()});
        edgesStr.split('\n').forEach(line => {
            const parts = line.split('-');
            if(parts.length === 2) es.push({from: parseInt(parts[0]), to: parseInt(parts[1])});
        });
        const container = document.getElementById('mynetwork');
        new vis.Network(container, {nodes: new vis.DataSet(nodes), edges: new vis.DataSet(es)}, {nodes:{shape:'circle', color:'#3498db'}});
        document.getElementById('result-text').innerText = "Phân tích hoàn tất: Sắc số dự kiến = 2";
    }

    // Khởi chạy kiểm tra khi load trang
    window.onload = checkAuth;
</script>

</body>
</html>
